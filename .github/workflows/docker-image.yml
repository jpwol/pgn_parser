name: Docker Compose CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start services
      run: docker compose up -d --build

    - name: Wait for parser to complete
      run: |
        echo "Waiting for parser container to finish..."
        docker compose wait parser
        EXIT_CODE=$?
        if [ $EXIT_CODE -ne 0 ]; then
          echo "Parser failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Check running containers
      run: docker compose ps

    - name: Run tests
      run: |
        docker compose exec -T db mariadb -u root -proot chess < tests/question1.sql

    - name: Print logs on failure
      if: failure()
      run: docker compose logs

    - name: Tear down
      if: always()
      run: docker compose down -v
